{% extends "base.html" %}

{% block title %}
    IES Monitoring - Login
{% endblock %}

{% block body %}
<div class="py-4 py-lg-5">
    <div class="row justify-content-center align-items-center g-4 g-lg-5">
        <div class="col-lg-6 col-xl-5 d-none d-lg-block">
            <img
                src="{{ url_for('static', filename='images/login_draw.webp') }}"
                class="img-fluid"
                alt="Login illustration"
                data-i18n-alt="login.illustration.alt"
            >
        </div>

        <div class="col-12 col-md-10 col-lg-6 col-xl-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <h2 class="h3 mb-2" data-i18n="login.welcome">Welcome Back</h2>
                        <p class="text-muted mb-0" data-i18n="login.subtitle">Sign in to continue in IES Monitoring.</p>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="email" data-i18n="login.email.label">Email address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-control form-control-lg"
                                placeholder="Enter email address"
                                data-i18n-placeholder="login.email.placeholder"
                                autocomplete="email"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password" data-i18n="login.password.label">Password</label>
                            <div class="input-group input-group-lg">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Enter password"
                                    data-i18n-placeholder="login.password.placeholder"
                                    autocomplete="current-password"
                                    required
                                />
                                <button
                                    id="togglePassword"
                                    type="button"
                                    class="btn btn-outline-secondary"
                                    aria-label="Toggle password visibility"
                                >
                                    <img
                                        src="{{ url_for('static', filename='images/eye-hide.svg') }}"
                                        alt="Toggle password"
                                        data-i18n-alt="login.password.label"
                                        width="20"
                                        height="20"
                                        id="togglePasswordImg"
                                    >
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" value="" id="rememberMe" />
                                <label class="form-check-label ms-1" for="rememberMe" data-i18n="login.remember">
                                    Remember me
                                </label>
                            </div>
                            <button
                                type="button"
                                class="btn btn-link p-0 text-decoration-none"
                                onclick="openResetPasswordModal()"
                            >
                                <span data-i18n="login.forgot">Forgot password?</span>
                            </button>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" data-i18n="login.submit">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% include "auth/forgetPassword.html" %}
{% endblock %}

{% block scripts %}
<script type="text/javascript" src="{{ url_for('static', filename='js/auth/auth.js') }}" defer></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/auth/forgetPassword.js') }}" defer></script>
{% endblock %}
