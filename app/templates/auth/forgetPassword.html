
<div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-labelledby="resetPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-semibold" id="resetPasswordModalLabel" data-i18n="forgot.title">Forgot Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body pt-2">
                <div class="small text-muted mb-3" data-i18n="forgot.subtitle">
                    Enter your account email and we will send password reset instructions.
                </div>
                <div id="forgetAlertDiv"></div>

                <form id="modalResetPassword" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="modalEmail" class="form-label" data-i18n="forgot.email.label">Email address</label>
                        <input
                            type="email"
                            class="form-control form-control-lg"
                            id="modalEmail"
                            name="modalEmail"
                            placeholder="example@example.com"
                            data-i18n-placeholder="forgot.email.placeholder"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg" id="modalSubmit" data-i18n="forgot.submit">Send Reset Link</button>
                    </div>
                    <div id="loadingMessage" class="text-center small text-muted mt-3" style="display: none;" data-i18n="forgot.loading">
                        Sending email...
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
