<!-- The Combined User Modal -->
<div class="modal fade" id="UserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-semibold" data-i18n="user.title">Update Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body pt-2">
                <div class="d-flex justify-content-end mb-3">
                    <button
                        type="button"
                        class="btn btn-sm btn-outline-primary"
                        id="accountsButton"
                        style="display: none;"
                        onclick="redirectToAccounts()"
                    >
                        <span data-i18n="user.accounts">Accounts</span>
                    </button>
                </div>

                <div class="text-center mb-4">
                    <div class="small text-muted mb-1" id="user_role"></div>
                    <div class="fw-semibold text-break" id="user_email"></div>
                </div>

                <form class="row g-3" id="UserForm" enctype="multipart/form-data" onsubmit="submitUserForm(event)">
                    <input type="hidden" id="userUUID" name="uuid">
                    <div class="col-12 col-md-6">
                        <label for="user_name" class="form-label"><span class="text-danger me-1">*</span><span data-i18n="user.first_name">First name:</span></label>
                        <input type="text" step="any" class="form-control form-control-lg" id="user_name" name="name" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="user_lastname" class="form-label"><span class="text-danger me-1">*</span><span data-i18n="user.last_name">Last name:</span></label>
                        <input type="text" step="any" class="form-control form-control-lg" id="user_lastname" name="lastname" autocomplete="username" required>
                    </div>

                    <div class="col-12">
                        <button
                            id="changePasswordLink"
                            type="button"
                            onclick="changePassword()"
                            class="btn btn-link p-0 text-decoration-none"
                            data-i18n="user.change_password"
                        >
                            Change password
                        </button>
                    </div>

                    <div class="col-12 pt-2">
                        <div class="d-grid d-md-flex justify-content-md-end gap-2">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary" data-i18n="user.update">Update</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
