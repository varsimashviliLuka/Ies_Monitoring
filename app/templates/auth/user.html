<!-- The Combined User Modal -->
<div class="modal fade" id="UserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
    
            <!-- Modal Header -->
            <div class="modal-header">
                <h4 class="modal-title" data-i18n="user.title">Update Profile</h4>
                <button type="button" class="btn btn-primary me-3 ms-3" id="accountsButton" style="display: none;" onclick="redirectToAccounts()">
                    <span data-i18n="user.accounts">Accounts</span>
                </button>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
    
            <!-- Modal body -->
            <div class="modal-body">
                <!-- Display Email as Text -->
                <div class="mb-1 text-center">
                    <span id="user_role" class="font-weight-normal"></span>
                </div>
                <div class="mb-5 text-center">
                    <span id="user_email" class="font-weight-normal"></span>
                </div>

                <form class="row mt-2" id="UserForm" enctype="multipart/form-data" onsubmit="submitUserForm(event)">
                    <input type="hidden" id="userUUID" name="uuid">
                    <div class="col">
                        <label for="user_name" class="form-label"><span class="text-danger me-1">*</span><span data-i18n="user.first_name">First name:</span></label>
                        <input type="text" step="any" class="form-control" id="user_name" name="name" required>
                    </div>
                    <div class="col">
                        <label for="user_lastname" class="form-label"><span class="text-danger me-1">*</span><span data-i18n="user.last_name">Last name:</span></label>
                        <input type="text" step="any" class="form-control" id="user_lastname" name="lastname" autocomplete="username" required>
                    </div>

                    <!-- Change Password Checkbox -->
                    <div class="m-3 form-check">
                        <a id="changePasswordLink" onclick="changePassword()" class="text-decoration-none" style="cursor: pointer;" data-i18n="user.change_password">Change password</a>
                    </div>

                    <div class="d-flex justify-content-center align-items-center m-2">
                        <button type="submit" class="btn btn-primary me-2" data-i18n="user.update">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
